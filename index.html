    <script>
      // Suppress Facebook SDK errors in console
      (function () {
        const originalError = console.error;
        const originalWarn = console.warn;

        const isFacebookError = (args) => {
          const msg = args.map(arg => String(arg)).join(' ');
          return (
            msg.includes("ErrorUtils caught an error") ||
            (msg.includes("Could not find element") && msg.includes("Caught in: Module")) ||
            msg.includes("fburl.com/debugjs")
          );
        };

        console.error = function (...args) {
          if (isFacebookError(args)) return;
          originalError.apply(console, args);
        };

        console.warn = function (...args) {
          if (isFacebookError(args)) return;
          originalWarn.apply(console, args);
        };
      })();
    </script>
